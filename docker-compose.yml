# ══════════════════════════════════════════════════════════════════════════════
#  Smart City Traffic System – Docker Compose
#  Services: Zookeeper · Kafka · PostgreSQL · Spark · Airflow · Producer
# ══════════════════════════════════════════════════════════════════════════════

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfd6io="
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflowuser:airflowpass@postgres:5432/airflowdb"
  AIRFLOW__WEBSERVER__SECRET_KEY: "smartcity_secret"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  # Traffic DB credentials (used by DAG tasks)
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: trafficdb
  POSTGRES_USER: trafficuser
  POSTGRES_PASSWORD: trafficpass
  TZ: Asia/Colombo

services:

  # ── Zookeeper (Kafka dependency) 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [traffic-net]

  # ── Kafka Broker 
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168   # 7 days
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks: [traffic-net]

  # ── Kafka topic initialiser (runs once then exits) 
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
       --topic traffic-raw --partitions 4 --replication-factor 1 &&
       echo 'Topic traffic-raw created.'"
    networks: [traffic-net]
    restart: "no"

  # ── PostgreSQL 
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: rootpass
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/01_create_users_dbs.sql:/docker-entrypoint-initdb.d/01_create_users_dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [traffic-net]

  # ── Create traffic schema after postgres is ready 
  postgres-schema:
    image: postgres:16-alpine
    container_name: postgres-schema
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: trafficpass
    command: >
      psql -h postgres -U trafficuser -d trafficdb
      -f /sql/02_traffic_schema.sql
    volumes:
      - ./db/02_traffic_schema.sql:/sql/02_traffic_schema.sql
    networks: [traffic-net]
    restart: "no"

  # ── Spark Master 
  spark-master:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-master
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080"   
      - "7077:7077"
    networks: [traffic-net]

  # ── Spark Worker 
  spark-worker:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-worker
    depends_on: [spark-master]
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: "2"
    networks: [traffic-net]

  # ── Spark Streaming Job 
  spark-streaming:
    build:
      context: .
      dockerfile: spark_streaming/Dockerfile
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-schema:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    volumes:
      - ./spark_streaming:/app
    entrypoint: ["/opt/spark/bin/spark-submit"]
    command:
      - "--master"
      - "spark://spark-master:7077"
      - "--conf"
      - "spark.sql.shuffle.partitions=4"
      - "--conf"
      - "spark.streaming.stopGracefullyOnShutdown=true"
      - "/app/stream_processor.py"
    restart: on-failure
    networks: [traffic-net]

  # ── Traffic Producer 
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: traffic-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: ["python", "traffic_producer.py", "--interval", "1"]
    restart: on-failure
    networks: [traffic-net]

  # ── Airflow – DB init (runs once) 
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
      postgres-schema:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command:
      - bash
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@smartcity.lk"
    restart: "no"
    networks: [traffic-net]

  # ── Airflow Webserver 
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"   
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./reports:/reports
      - airflow-logs:/opt/airflow/logs
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [traffic-net]

  # ── Airflow Scheduler 
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./reports:/reports
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    restart: on-failure
    networks: [traffic-net]

# ── Volumes 
volumes:
  postgres-data:
  spark-checkpoints:
  airflow-logs:

# ── Network 
networks:
  traffic-net:
    driver: bridge